Ed. Solomon

&gt; "At the very core of this article lay the assumption of Causality, that the **Effect cannot precede the Cause**; likewise, the **Aggregate Percentage of a Candidate cannot precede the Election Day and the Mail-in Percentages of that candidate**. In a fair election, the aggregate cannot be known until after all ballots are cast; in an election that is unfair, where the aggregate was predetermined, the aggregate becomes the cause and the Mail-in Vote (and/or the Election Day Vote) becomes the effect...and the laws of mathematics allow us to readily discern between which was the cause...and which was the effect."

&gt; To Paraphrase Immanuel Kant:  “The causation is the thing without which, is a condition of possibility of a thing, and so it is satisfied in the thing.”
